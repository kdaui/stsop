<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K D A U I . — Feed</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="background-pattern"></div>

  <div class="app-container">
    <header class="terminal-header">
      <div class="terminal-buttons">
        <div class="terminal-button close"></div>
        <div class="terminal-button minimize"></div>
        <div class="terminal-button maximize"></div>
      </div>
      <div class="terminal-title">NERV_SOCIAL_FEED_v2.0</div>
      <div class="terminal-status">
        <span class="status-indicator online"></span>
        <span class="status-text">LIVE</span>
      </div>
    </header>

    <main class="feed-layout">
      <div class="feed-column">
        
        <section class="compose-area">
          <form id="postForm" class="post-form">
            <div class="input-wrapper">
              <input type="text" id="name" class="name-input" placeholder="IDENT_ID" required />
              <textarea id="message" class="message-input" placeholder="What is the status of the Eva?" required></textarea>
            </div>
            <div class="compose-actions">
              <span class="system-line">> AWAITING_INPUT</span>
              <button type="submit" class="submit-btn">TRANSMIT</button>
            </div>
          </form>
        </section>

        <div id="posts" class="posts-container">
          <!-- Posts will be here -->
        </div>

        <div class="loading-indicator" id="loadingIndicator">
          <span class="loading-text">RETRIVING DATA</span>
          <div class="loading-dots"><span>.</span><span>.</span><span>.</span></div>
        </div>
      </div>
    </main>

    <footer class="terminal-footer">
		"God's in his heaven. All's right with the world."
    </footer>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
